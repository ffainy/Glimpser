<!DOCTYPE html>
<html lang="en" data-dp-standalone="true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glimpser Settings</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      transition: background 0.25s ease;
    }

    body[data-dp-theme="dark"]  {
      background:
        radial-gradient(circle at top left, rgba(176, 133, 255, 0.22), transparent 26%),
        radial-gradient(circle at 78% 18%, rgba(126, 87, 255, 0.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 176, 89, 0.14), transparent 22%),
        #08070d;
    }

    body[data-dp-theme="light"] {
      background:
        radial-gradient(circle at top left, rgba(62, 54, 76, 0.05), transparent 22%),
        radial-gradient(circle at bottom right, rgba(114, 90, 72, 0.05), transparent 18%),
        #f3f0eb;
    }

    body { background: #08070d; } /* default before theme loads */
  </style>
</head>
<body>
  <script src="i18n.js"></script>
  <script src="settings-panel.js"></script>
</body>
</html>
