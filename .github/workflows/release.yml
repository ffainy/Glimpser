name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Sync package versions from tag
        run: |
          CURRENT_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "$CURRENT_VERSION" = "${{ steps.version.outputs.VERSION }}" ]; then
            echo "Package version already $CURRENT_VERSION"
          else
            npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version
          fi

      - name: Run release quality gates
        run: |
          npm test
          node scripts/build.js ${{ steps.version.outputs.VERSION }}

      - name: Refresh Unreleased changelog for tag
        run: node scripts/update-changelog.mjs --mode unreleased --tag ${{ github.ref_name }}

      - name: Generate release changelog and notes
        run: node scripts/update-changelog.mjs --mode release --tag ${{ github.ref_name }}

      - name: Commit release metadata to default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          cp CHANGELOG.md /tmp/CHANGELOG.md
          cp package.json /tmp/package.json
          cp package-lock.json /tmp/package-lock.json
          git reset --hard HEAD
          git fetch origin "$DEFAULT_BRANCH"
          git switch -C "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          cp /tmp/CHANGELOG.md CHANGELOG.md
          cp /tmp/package.json package.json
          cp /tmp/package-lock.json package-lock.json

          if git diff --quiet -- CHANGELOG.md package.json package-lock.json; then
            echo "No release metadata changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "build(release): sync metadata for ${{ github.ref_name }}"
          git push origin "HEAD:$DEFAULT_BRANCH"

      - name: Create Firefox XPI (rename from zip)
        run: |
          cp dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip \
             dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi

      - name: Create Chrome CRX (sign with private key)
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "$CRX_PRIVATE_KEY" > /tmp/crx_key.pem
          node scripts/sign-crx.cjs \
            dist/chrome \
            /tmp/crx_key.pem \
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx
          rm -f /tmp/crx_key.pem

      - name: Generate checksums
        run: |
          cd dist
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi > glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip > glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx > glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip > glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip.sha256

      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: glimpser-${{ steps.version.outputs.VERSION }}-dist
          path: dist/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Glimpser ${{ github.ref_name }}
          body_path: .github/release-notes.md
          files: |
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip.sha256
