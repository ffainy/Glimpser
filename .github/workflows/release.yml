name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build Firefox and Chrome packages
        run: node scripts/build.js ${{ steps.version.outputs.VERSION }}

      - name: Create Firefox XPI (rename from zip)
        run: |
          cp dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip \
             dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi

      - name: Create Chrome CRX (sign with private key)
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "$CRX_PRIVATE_KEY" > /tmp/crx_key.pem
          node scripts/sign-crx.cjs \
            dist/chrome \
            /tmp/crx_key.pem \
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx
          rm -f /tmp/crx_key.pem

      - name: Generate checksums
        run: |
          cd dist
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi > glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip > glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx > glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx.sha256
          sha256sum glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip > glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip.sha256

      - name: Upload build artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: glimpser-${{ steps.version.outputs.VERSION }}-dist
          path: dist/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Glimpser ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.xpi.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-firefox.zip.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.crx.sha256
            dist/glimpser-${{ steps.version.outputs.VERSION }}-chrome.zip.sha256
