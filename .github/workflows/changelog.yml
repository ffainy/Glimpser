name: Changelog

on:
  push:
    branches:
      - master

concurrency:
  group: changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh-unreleased:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh Unreleased changelog
        run: node scripts/update-changelog.mjs --mode unreleased

      - name: Commit Unreleased changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog updates to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): refresh unreleased entries"
          git push origin HEAD:${{ github.ref_name }}
